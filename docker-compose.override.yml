services:
  backend:
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app
    networks:
      shortlab-backend:
        internal: false

  frontend:
    ports:
      - "127.0.0.1:5175:80"
    environment:
      - VITE_API_URL=http://localhost:8000

  renderer:
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      shortlab-backend:
        internal: false

networks:
  shortlab-backend:
    internal: false
