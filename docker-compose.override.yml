services:
  backend:
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app
    environment:
      - MPLCONFIGDIR=/tmp/matplotlib
      - HF_HOME=/tmp/huggingface
      - XDG_CACHE_HOME=/tmp/cache
      - FONTCONFIG_CACHE=/tmp/fontconfig
    networks:
      - shortlab-backend

  frontend:
    ports:
      - "127.0.0.1:5177:80"
    environment:
      - VITE_API_URL=
    networks:
      - shortlab-backend

  renderer:
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - shortlab-backend

networks:
  shortlab-backend:
    internal: false
