services:
  backend:
    build: .
    container_name: shortlab-backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  frontend:
    build:
      context: ./dashboard
      args:
        VITE_API_URL: http://localhost:8000
    container_name: shortlab-frontend
    ports:
      - "5175:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  renderer:
    build:
      context: .
      dockerfile: render-service/Dockerfile
    container_name: shortlab-renderer
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./output:/output
    environment:
      - REMOTION_BUNDLE_PATH=/app/remotion
      - OUTPUT_DIR=/output
      - PORT=3100
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
